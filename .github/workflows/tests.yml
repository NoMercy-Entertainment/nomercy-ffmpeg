name: Test & Security

on:
  workflow_run:
    workflows:
      - CI/CD Pipeline
    types:
      - completed
  workflow_dispatch:
    inputs:
      force_test:
        description: "Force test of all images"
        required: true
        type: boolean
        default: true

jobs:
  # Validate Darwin binaries on Linux (format checks only)
  darwin-validation:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            expected_minos: "10.13"
          - arch: arm64
            expected_minos: "11.0"
    continue-on-error: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: build-artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: downloads/

      - name: Install Validation Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y llvm file

      - name: Extract Darwin Binary
        run: |
          FILE="downloads/ffmpeg-8.0-darwin-${{ matrix.arch }}.tar.gz"
          if [ ! -f "$FILE" ]; then
            echo "Binary not found: $FILE"
            exit 1
          fi
          tar -xzf "$FILE"
          chmod +x ffmpeg ffprobe

      - name: Validate Binary Format
        run: |
          echo "=========================================="
          echo "Validating darwin-${{ matrix.arch }} binary"
          echo "=========================================="

          # Check Mach-O format
          echo "File type:"
          file ffmpeg
          file ffmpeg | grep -q "Mach-O 64-bit" || { echo "❌ Not Mach-O"; exit 1; }

          # Check architecture
          if [ "${{ matrix.arch }}" == "arm64" ]; then
            file ffmpeg | grep -q "arm64" || { echo "❌ Wrong arch"; exit 1; }
          else
            file ffmpeg | grep -q "x86_64" || { echo "❌ Wrong arch"; exit 1; }
          fi

          # Check deployment target
          echo ""
          echo "Deployment target:"
          llvm-objdump --macho --private-headers ffmpeg | grep -A 3 "LC_BUILD_VERSION"

          MINOS=$(llvm-objdump --macho --private-headers ffmpeg | grep -A 3 "LC_BUILD_VERSION" | grep "minos" | awk '{print $2}')
          echo "Found: $MINOS"
          echo "Expected: ${{ matrix.expected_minos }}"

          if [[ "$MINOS" == "${{ matrix.expected_minos }}"* ]]; then
            echo "✅ Correct deployment target"
          else
            echo "❌ Wrong deployment target"
            exit 1
          fi

          echo "=========================================="
          echo "✅ Validation passed!"
          echo "=========================================="

  # Test platform builds with matrix strategy
  platform-tests:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 - native
          - os: ubuntu-latest
            arch: x86_64
            platform: linux
            file_ext: tar.gz

          # Linux aarch64 - QEMU
          - os: ubuntu-latest
            arch: aarch64
            platform: linux
            file_ext: tar.gz
            use_qemu: true

          # Windows - skip tests (no Wine)
          - os: ubuntu-latest
            arch: x86_64
            platform: windows
            file_ext: zip
            skip_tests: true

          # macOS Intel
          - os: macos-13
            arch: x86_64
            platform: darwin
            file_ext: tar.gz

          # macOS Apple Silicon
          - os: macos-14
            arch: arm64
            platform: darwin
            file_ext: tar.gz
    continue-on-error: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        if: matrix.use_qemu == true
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: build-artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: downloads/

      - name: Extract Binary (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" == "linux" ] && [ "${{ matrix.arch }}" == "aarch64" ]; then
            FILE="downloads/ffmpeg-8.0-linux-aarch64.tar.gz"
          else
            FILE="downloads/ffmpeg-8.0-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz"
          fi

          if [ ! -f "$FILE" ]; then
            echo "Binary not found: $FILE"
            echo "Available files:"
            ls -la downloads/ || true
            exit 1
          fi

          tar -xzf "$FILE"
          chmod +x ffmpeg ffprobe
          echo "✅ Extracted $FILE"

      - name: Extract Binary (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          FILE="downloads/ffmpeg-8.0-windows-${{ matrix.arch }}.zip"

          if [ ! -f "$FILE" ]; then
            echo "Binary not found: $FILE"
            exit 1
          fi

          unzip -o "$FILE"
          echo "✅ Extracted $FILE"

      - name: Run Tests (Linux aarch64 via QEMU)
        if: matrix.platform == 'linux' && matrix.use_qemu == true
        run: |
          # Test via Docker with QEMU
          docker run --rm --platform linux/arm64 \
            -v "$(pwd)/ffmpeg:/ffmpeg" \
            -v "$(pwd)/ffprobe:/ffprobe" \
            -v "${{ github.workspace }}/tests:/tests" \
            ubuntu:22.04 bash -c "
              chmod +x /ffmpeg /ffprobe
              /ffmpeg -version || { echo '❌ Binary failed to execute'; exit 1; }
              echo '✅ Binary executed successfully via QEMU'
            "

      - name: Run Tests (Unix - native execution)
        if: matrix.platform != 'windows' && matrix.use_qemu != true && matrix.skip_tests != true
        shell: bash
        run: |
          ./ffmpeg -version || { echo "❌ ffmpeg failed to run"; exit 1; }

          if [ -f "${{ github.workspace }}/tests/tests.sh" ]; then
            echo "Running full test suite..."
            chmod +x "${{ github.workspace }}/tests/tests.sh"
            "${{ github.workspace }}/tests/tests.sh" "${{ github.workspace }}" || {
              echo "⚠️ Tests failed, but continuing..."
              exit 0
            }
          else
            echo "✅ Basic execution test passed"
          fi

      - name: Skip Tests (Windows)
        if: matrix.skip_tests == true
        run: |
          echo "⏭️ Skipping tests for Windows (no Wine support)"
          echo "Binary was validated during extraction"

  # Security scanning for Docker images
  security-scans:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - nomercyentertainment/ffmpeg-base:latest
          - nomercyentertainment/ffmpeg-linux-x86_64:latest
          - nomercyentertainment/ffmpeg-linux-aarch64:latest
          - nomercyentertainment/ffmpeg-windows-x86_64:latest
          - nomercyentertainment/ffmpeg-darwin-x86_64:latest
          - nomercyentertainment/ffmpeg-darwin-arm64:latest
    continue-on-error: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Run Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Security Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Prepare release artifacts if tests pass
  prepare-release:
    runs-on: ubuntu-latest
    needs: [darwin-validation, platform-tests]
    continue-on-error: false
    if: success()
    steps:    
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: downloads/

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: downloads/
          retention-days: 90