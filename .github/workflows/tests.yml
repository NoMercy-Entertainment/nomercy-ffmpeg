name: Test & Security

on:
  workflow_run:
    workflows:
      - CI/CD Pipeline
    types:
      - completed
  workflow_dispatch:
    inputs:
      force_test:
        description: "Force test of all images"
        required: true
        type: boolean
        default: true

jobs:
  # Test platform builds with matrix strategy
  platform-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            platform: linux
            file_ext: tar.gz
          - os: ubuntu-latest
            arch: aarch64
            platform: linux
            file_ext: tar.gz
          - os: ubuntu-latest
            arch: x86_64
            platform: darwin
            file_ext: tar.gz
          - os: ubuntu-latest
            arch: arm64
            platform: darwin
            file_ext: tar.gz
          - os: ubuntu-latest
            arch: x86_64
            platform: windows
            file_ext: zip
    continue-on-error: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: downloads/

      - name: Unpack ffmpeg binary (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" == "linux" ] && [ "${{ matrix.arch }}" == "aarch64" ]; then
            FILE_NAME="downloads/ffmpeg-8.0-linux-aarch64.tar.gz"
          else
            FILE_NAME="downloads/ffmpeg-8.0-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz"
          fi
          
          if [ -f "$FILE_NAME" ]; then
            tar -xvf "$FILE_NAME"
            chmod +x "${{ github.workspace }}/ffmpeg" "${{ github.workspace }}/ffprobe"
          else
            echo "Warning: $FILE_NAME not found"
            exit 0
          fi

      - name: Unpack ffmpeg binary (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          FILE_NAME="downloads/ffmpeg-8.0-windows-${{ matrix.arch }}.zip"
          if [ -f "$FILE_NAME" ]; then
            unzip -o "$FILE_NAME"
          else
            echo "Warning: $FILE_NAME not found"
            exit 0
          fi

      - name: Run Tests (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          if [ -f "${{ github.workspace }}/tests/tests.sh" ]; then
            chmod +x "${{ github.workspace }}/tests/tests.sh"
            "${{ github.workspace }}/tests/tests.sh" "${{ github.workspace }}"
          fi
          exit 0

      - name: Run Tests (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          if (Test-Path "${{ github.workspace }}\tests\tests.ps1") {
            & "${{ github.workspace }}\tests\tests.ps1" "${{ github.workspace }}"
          }
          exit 0

  # Security scanning for Docker images
  security-scans:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - nomercyentertainment/ffmpeg-base:latest
          - nomercyentertainment/ffmpeg-linux-x86_64:latest
          - nomercyentertainment/ffmpeg-linux-aarch64:latest
          - nomercyentertainment/ffmpeg-windows-x86_64:latest
          - nomercyentertainment/ffmpeg-darwin-x86_64:latest
          - nomercyentertainment/ffmpeg-darwin-arm64:latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Run Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Security Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Prepare release artifacts if tests pass
  prepare-release:
    runs-on: ubuntu-latest
    needs: [platform-tests]
    continue-on-error: false
    if: success()
    steps:    
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: downloads/

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: downloads/
          retention-days: 90