name: Detect Changes

on:
  workflow_call:
    inputs:
      force_rebuild:
        description: 'Force rebuild all components'
        required: false
        type: boolean
        default: false
    outputs:
      version:
        description: 'Next version tag (vMAJOR.MINOR.PATCH+1)'
        value: ${{ jobs.detect-changes.outputs.version }}
      base-changed:
        description: 'Base image needs rebuild'
        value: ${{ jobs.detect-changes.outputs.base-changed }}
      platforms-to-build:
        description: 'JSON array of platform names to (re)build, e.g. ["linux-x86_64","windows-x86_64"]'
        value: ${{ jobs.detect-changes.outputs.platforms-to-build }}
      test-matrix:
        description: 'JSON {"include":[…]} for the test job — only entries whose platform is being built'
        value: ${{ jobs.detect-changes.outputs.test-matrix }}
      any-changed:
        description: 'True if base or any platform needs rebuild'
        value: ${{ jobs.detect-changes.outputs.any-changed }}

# Single source of truth for the platform list. Anything that needs to know
# about platforms (this workflow, the matrix in main.yml) reads it from here.
env:
  ALL_PLATFORMS: "linux-x86_64 linux-aarch64 windows-x86_64 darwin-x86_64 darwin-arm64 freebsd-x86_64"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      base-changed: ${{ steps.detect.outputs.base-changed }}
      platforms-to-build: ${{ steps.detect.outputs.platforms-to-build }}
      test-matrix: ${{ steps.detect.outputs.test-matrix }}
      any-changed: ${{ steps.detect.outputs.any-changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Compute next version
        id: version
        run: |
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          MAJOR=$(echo "$LATEST_TAG" | cut -d. -f1 | sed 's/v//')
          MINOR=$(echo "$LATEST_TAG" | cut -d. -f2)
          PATCH=$(echo "$LATEST_TAG" | cut -d. -f3)
          NEW_VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Latest tag: ${LATEST_TAG} → next: ${NEW_VERSION}"

      - name: Detect changed components
        id: detect
        env:
          FORCE_REBUILD: ${{ inputs.force_rebuild }}
        run: |
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

          # ── Per-platform test-runner mapping ──────────────────────────────
          # Single source of truth for "how do we smoke-test platform X":
          #   os    — GitHub-hosted runner image
          #   ext   — archive extension produced by the build
          #   kind  — "unix" or "windows" (selects the test script)
          # macos-15-intel is the supported x86_64 macOS runner (macos-13 was
          # retired 2025-12-04; Intel macOS is supported until ~Fall 2027).
          # macos-latest is arm64. ubuntu-latest is x86_64 — linux-aarch64 can
          # only verify the archive extracts, smoke.sh handles the cross-arch skip.
          # freebsd-x86_64 has no GitHub-hosted runner; like linux-aarch64 it
          # runs on ubuntu-latest where smoke.sh downgrades to a presence check.
          declare -A OS=(
            [linux-x86_64]=ubuntu-latest
            [linux-aarch64]=ubuntu-latest
            [windows-x86_64]=windows-latest
            [darwin-x86_64]=macos-15-intel
            [darwin-arm64]=macos-latest
            [freebsd-x86_64]=ubuntu-latest
          )
          declare -A EXT=(
            [linux-x86_64]=tar.gz
            [linux-aarch64]=tar.gz
            [windows-x86_64]=zip
            [darwin-x86_64]=tar.gz
            [darwin-arm64]=tar.gz
            [freebsd-x86_64]=tar.gz
          )
          declare -A KIND=(
            [linux-x86_64]=unix
            [linux-aarch64]=unix
            [windows-x86_64]=windows
            [darwin-x86_64]=unix
            [darwin-arm64]=unix
            [freebsd-x86_64]=unix
          )

          emit_outputs() {
            local platforms_json="$1" base_changed="$2"
            local include_json='[]'
            if [[ "${platforms_json}" != "[]" ]]; then
              local entries=()
              while read -r p; do
                entries+=("$(jq -nc \
                  --arg platform "$p" \
                  --arg os "${OS[$p]}" \
                  --arg ext "${EXT[$p]}" \
                  --arg kind "${KIND[$p]}" \
                  '{platform:$platform, os:$os, ext:$ext, kind:$kind}')")
              done < <(echo "${platforms_json}" | jq -r '.[]')
              include_json=$(printf '%s\n' "${entries[@]}" | jq -sc '.')
            fi
            local test_matrix
            test_matrix=$(jq -nc --argjson include "${include_json}" '{include:$include}')

            local any=false
            [[ "${base_changed}" == "true" || "${platforms_json}" != "[]" ]] && any=true

            {
              echo "base-changed=${base_changed}"
              echo "platforms-to-build=${platforms_json}"
              echo "test-matrix=${test_matrix}"
              echo "any-changed=${any}"
            } >> "$GITHUB_OUTPUT"

            echo "─── Detection result ────────────────────────────────"
            echo "  base-changed:       ${base_changed}"
            echo "  platforms-to-build: ${platforms_json}"
            echo "  test-matrix:        ${test_matrix}"
            echo "  any-changed:        ${any}"
          }

          # Force-rebuild shortcut: every platform + base rebuilds.
          if [[ "${FORCE_REBUILD}" == "true" ]]; then
            echo "Force rebuild requested — marking everything as changed."
            PLATFORMS_JSON=$(echo "${ALL_PLATFORMS}" | jq -Rc 'split(" ")')
            emit_outputs "${PLATFORMS_JSON}" "true"
            exit 0
          fi

          # Diff against previous commit. On the first commit of a branch HEAD^
          # doesn't exist, so we fall back to an empty diff (=> nothing changed,
          # which is the safe default — operator can force_rebuild if needed).
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD 2>/dev/null || true)
          echo "Changed files:"
          echo "${CHANGED_FILES:-(none)}"

          # ── Classify changed paths ─────────────────────────────────────────
          # Shared inputs affect every platform's build:
          #   scripts/*.sh, scripts/{init,patches,resources}/*,
          #   scripts/includes/<non-platform-file> (e.g. raw .c sources),
          #   dev/init/*
          # Workflow changes affect everything by definition.
          # Platform-specific scripts only affect their own platform:
          #   {scripts,dev}/includes/<platform>/*  where <platform> ∈
          #   {linux, darwin, windows}.  (linux script change rebuilds both
          #   linux-x86_64 and linux-aarch64; darwin rebuilds both darwin
          #   variants; windows rebuilds windows-x86_64.)
          matches() { echo "${CHANGED_FILES}" | grep -qE "$1"; }

          SHARED=false
          matches "^scripts/(init|patches|resources)/" && SHARED=true
          matches "^scripts/[^/]+\.sh$"                && SHARED=true
          matches "^(scripts|dev)/includes/[^/]+$"     && SHARED=true
          matches "^dev/init/"                         && SHARED=true

          # npm-publish.yml is an npm-client-only workflow — it never affects
          # the binaries, so a change to it alone must not force a rebuild.
          WORKFLOW=false
          if echo "${CHANGED_FILES}" \
               | grep -E "^\.github/workflows/" \
               | grep -qvE "^\.github/workflows/npm-publish\.yml$"; then
            WORKFLOW=true
          fi

          LINUX_SCRIPTS=false;   matches "^(scripts|dev)/includes/linux/"   && LINUX_SCRIPTS=true
          DARWIN_SCRIPTS=false;  matches "^(scripts|dev)/includes/darwin/"  && DARWIN_SCRIPTS=true
          WINDOWS_SCRIPTS=false; matches "^(scripts|dev)/includes/windows/" && WINDOWS_SCRIPTS=true
          FREEBSD_SCRIPTS=false; matches "^(scripts|dev)/includes/freebsd/" && FREEBSD_SCRIPTS=true

          # Base image rebuilds on its own Dockerfile or shared script changes.
          BASE_CHANGED=false
          matches "ffmpeg-base\.dockerfile" && BASE_CHANGED=true
          [[ "${SHARED}" == "true" ]] && BASE_CHANGED=true

          # A workflow-file change conservatively rebuilds everything so that
          # any new build flag or environment tweak actually applies.
          if [[ "${WORKFLOW}" == "true" ]]; then
            BASE_CHANGED=true
          fi

          # Per-platform decision:
          #   rebuild if base rebuilds, or its own Dockerfile changed,
          #   or its platform-family scripts changed, or workflow changed.
          platform_changed() {
            local platform="$1" platform_scripts_var="$2"
            local dockerfile="ffmpeg-${platform}.dockerfile"
            local scripts_changed="${!platform_scripts_var}"

            [[ "${BASE_CHANGED}" == "true" ]]      && { echo true; return; }
            [[ "${WORKFLOW}" == "true" ]]          && { echo true; return; }
            [[ "${scripts_changed}" == "true" ]]   && { echo true; return; }
            matches "${dockerfile}"                && { echo true; return; }
            echo false
          }

          echo "─── State before platform loop ──────────────────────"
          echo "  ALL_PLATFORMS:    [${ALL_PLATFORMS}]"
          echo "  BASE_CHANGED:     ${BASE_CHANGED}"
          echo "  WORKFLOW:         ${WORKFLOW}"
          echo "  LINUX_SCRIPTS:    ${LINUX_SCRIPTS}"
          echo "  DARWIN_SCRIPTS:   ${DARWIN_SCRIPTS}"
          echo "  WINDOWS_SCRIPTS:  ${WINDOWS_SCRIPTS}"
          echo "  FREEBSD_SCRIPTS:  ${FREEBSD_SCRIPTS}"

          PLATFORMS=()

          # Fast path: when base rebuilds (incl. workflow changes), every
          # platform must rebuild — they all FROM the base. Skip the
          # per-platform classification entirely. This also dodges any
          # weirdness in the per-iteration loop logic.
          if [[ "${BASE_CHANGED}" == "true" ]]; then
            echo "  → BASE_CHANGED=true: including all platforms"
            for p in ${ALL_PLATFORMS}; do
              PLATFORMS+=("${p}")
            done
          else
            for p in ${ALL_PLATFORMS}; do
              case "${p}" in
                linux-*)   var=LINUX_SCRIPTS   ;;
                darwin-*)  var=DARWIN_SCRIPTS  ;;
                windows-*) var=WINDOWS_SCRIPTS ;;
                freebsd-*) var=FREEBSD_SCRIPTS ;;
                *)         var=""              ;;
              esac
              result="$(platform_changed "${p}" "${var}")"
              echo "  loop[${p}]: var=${var} → result=${result}"
              if [[ "${result}" == "true" ]]; then
                PLATFORMS+=("${p}")
              fi
            done
          fi

          echo "  PLATFORMS array: (${#PLATFORMS[@]}) ${PLATFORMS[*]}"

          # Emit JSON array — directly usable as matrix input via fromJSON().
          # -n is critical: without it, jq consumes the first stdin line as
          # its main filter input, and `inputs` reads from the SECOND line
          # onwards — silently dropping element 0. With -n, jq starts with
          # null input and `inputs` reads everything.
          if [[ ${#PLATFORMS[@]} -eq 0 ]]; then
            PLATFORMS_JSON="[]"
          else
            PLATFORMS_JSON=$(printf '%s\n' "${PLATFORMS[@]}" | jq -Rcn '[inputs]')
          fi

          emit_outputs "${PLATFORMS_JSON}" "${BASE_CHANGED}"
