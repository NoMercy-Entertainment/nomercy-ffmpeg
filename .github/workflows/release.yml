name: Release

on:
  workflow_run:
    workflows:
      - Test & Security
    types:
      - completed
    branches:
      - master
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force release creation'
        required: true
        type: boolean
        default: false
      
jobs:    
  # Only create release if tests passed
  check-prerequisites:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump-version.outputs.version }}
      should_release: ${{ steps.check-status.outputs.should_release }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check workflow run status
        id: check-status
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force_release }}" == "true" ]]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Force release requested"
          elif [[ "${{ github.event.workflow_run.conclusion }}" == "success" ]]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Tests passed - proceeding with release"
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "Tests failed or were cancelled - skipping release"
          fi
      
      - name: Generate Version
        id: bump-version
        run: |
          git config --global --add safe.directory ${{ github.workspace }}
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          
          echo "LATEST_TAG=$LATEST_TAG" 

          # Extract version components
          MAJOR=$(echo "$LATEST_TAG" | cut -d. -f1 | sed 's/v//')
          MINOR=$(echo "$LATEST_TAG" | cut -d. -f2)
          PATCH=$(echo "$LATEST_TAG" | cut -d. -f3)

          echo "MAJOR=$MAJOR, MINOR=$MINOR, PATCH=$PATCH"

          # Increment patch version
          NEW_PATCH=$(($PATCH + 1))
          NEW_VERSION=v$MAJOR.$MINOR.$NEW_PATCH 
          
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version will be: $NEW_VERSION"
    
  # Create GitHub release with assets
  create-release:
    runs-on: ubuntu-latest
    needs: check-prerequisites
    if: needs.check-prerequisites.outputs.should_release == 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Release Artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: downloads/

      - name: List Downloaded Files
        run: |
          echo "Downloaded files:"
          find downloads -type f -ls || echo "No files found"
        
      - name: Create Release
        id: create-release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.check-prerequisites.outputs.version }}
          release_name: FFmpeg Build ${{ needs.check-prerequisites.outputs.version }}
          draft: false
          prerelease: false
          body: |
            # FFmpeg Cross-Platform Build ${{ needs.check-prerequisites.outputs.version }}
            
            **Internal Build for NoMercy MediaServer**
            
            This release contains cross-platform FFmpeg binaries optimized for the NoMercy MediaServer project.
            
            ## Included Platforms:
            - Linux x86_64
            - Linux aarch64 (ARM64)
            - Windows x86_64
            - macOS x86_64
            - macOS ARM64 (Apple Silicon)
            
            ## Security
            All binaries have been scanned for vulnerabilities using Trivy.
            
            ## Usage
            These binaries are specifically configured for NoMercy MediaServer and may not be suitable for general use.
            
            ---
            
            Built with ❤️ by [NoMercy Entertainment](https://nomercy.tv)

      # Upload platform-specific release assets
      - name: Upload Linux x86_64 Asset
        uses: actions/upload-release-asset@v1
        if: hashFiles('downloads/ffmpeg-8.0-linux-x86_64.tar.gz') != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create-release.outputs.upload_url }}
          asset_path: downloads/ffmpeg-8.0-linux-x86_64.tar.gz
          asset_name: ffmpeg-8.0-linux-x86_64-${{ needs.check-prerequisites.outputs.version }}.tar.gz
          asset_content_type: application/gzip

      - name: Upload Linux Aarch64 Asset
        uses: actions/upload-release-asset@v1
        if: hashFiles('downloads/ffmpeg-8.0-linux-aarch64.tar.gz') != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create-release.outputs.upload_url }}
          asset_path: downloads/ffmpeg-8.0-linux-aarch64.tar.gz
          asset_name: ffmpeg-8.0-linux-aarch64-${{ needs.check-prerequisites.outputs.version }}.tar.gz
          asset_content_type: application/gzip

      - name: Upload Windows x86_64 Asset
        uses: actions/upload-release-asset@v1
        if: hashFiles('downloads/ffmpeg-8.0-windows-x86_64.zip') != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create-release.outputs.upload_url }}
          asset_path: downloads/ffmpeg-8.0-windows-x86_64.zip
          asset_name: ffmpeg-8.0-windows-x86_64-${{ needs.check-prerequisites.outputs.version }}.zip
          asset_content_type: application/zip

      - name: Upload Darwin x86_64 Asset
        uses: actions/upload-release-asset@v1
        if: hashFiles('downloads/ffmpeg-8.0-darwin-x86_64.tar.gz') != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create-release.outputs.upload_url }}
          asset_path: downloads/ffmpeg-8.0-darwin-x86_64.tar.gz
          asset_name: ffmpeg-8.0-darwin-x86_64-${{ needs.check-prerequisites.outputs.version }}.tar.gz
          asset_content_type: application/gzip

      - name: Upload Darwin ARM64 Asset
        uses: actions/upload-release-asset@v1
        if: hashFiles('downloads/ffmpeg-8.0-darwin-arm64.tar.gz') != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create-release.outputs.upload_url }}
          asset_path: downloads/ffmpeg-8.0-darwin-arm64.tar.gz
          asset_name: ffmpeg-8.0-darwin-arm64-${{ needs.check-prerequisites.outputs.version }}.tar.gz
          asset_content_type: application/gzip

      # Notify relevant services (could be Slack, Discord, etc.)
      - name: Post-Release Notification
        if: success()
        run: |
          echo "✅ Release ${{ needs.check-prerequisites.outputs.version }} created successfully"
          echo "All platform binaries have been uploaded and are ready for use"
