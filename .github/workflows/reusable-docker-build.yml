name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      dockerfile:
        description: 'Dockerfile to build'
        required: true
        type: string
      platform:
        description: 'Platform name for tagging'
        required: true
        type: string
      context:
        description: 'Build context'
        required: false
        type: string
        default: '.'
      secrets_repo:
        description: 'Whether to fetch secrets repository'
        required: false
        type: boolean
        default: true
      depends_on_base:
        description: 'Whether this build depends on base image'
        required: false
        type: boolean
        default: true
      labels:
        description: 'Labels for the self-hosted runner'
        required: true
        type: string
      no_cache:
        description: 'Skip Docker layer cache (force full rebuild)'
        required: false
        type: boolean
        default: false
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      PAT_TOKEN:
        required: false

jobs:
  docker-build:
    runs-on: ${{ inputs.labels }}
    strategy:
      fail-fast: false  # Don't cancel other builds if one fails
    steps:
      - name: Free Disk Space (Ubuntu)
        if: ${{ !contains(inputs.labels, 'beast-unit') }}
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Check Available Space
        run: |
          echo "🔍 Checking available disk space..."
          df -h
          free -h
          echo "Available space in /tmp: $(df -h /tmp | tail -1 | awk '{print $4}')"

      - name: Checkout Code
        uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Setup Error Handling
        run: |
          # Create error handling functions
          cat > error_handler.sh << 'EOF'
          #!/bin/bash
          retry_with_backoff() {
            local max_attempts=$1
            local delay=$2
            local command="$3"
            local attempt=1
            while [ $attempt -le $max_attempts ]; do
              echo "🔄 Attempt $attempt/$max_attempts: $command"
              if eval "$command"; then
                echo "✅ Success on attempt $attempt"
                return 0
              fi
              if [ $attempt -eq $max_attempts ]; then
                echo "❌ Failed after $max_attempts attempts"
                return 1
              fi
              local sleep_time=$((delay * (2 ** (attempt - 1))))
              echo "⏰ Waiting ${sleep_time}s..."
              sleep $sleep_time
              ((attempt++))
            done
          }
          docker_retry() {
            retry_with_backoff 3 10 "$1"
          }
          EOF
          chmod +x error_handler.sh
          source error_handler.sh

      - name: Set up Docker Buildx
        run: |
          # Use default docker driver — no nested buildkit container,
          # avoids overlay-on-overlay issues in DinD runners
          docker buildx use default
          docker buildx inspect

      - name: Create Cache Directories
        run: |
          mkdir -p ~/.docker/buildx-cache
          mkdir -p ~/.cache/pip
          mkdir -p ~/.cache/npm

      - name: Cache Docker Buildx
        uses: actions/cache@v4
        with:
          path: ~/.docker/buildx-cache
          key: ${{ runner.os }}-buildx-${{ inputs.platform }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ inputs.platform }}-
            ${{ runner.os }}-buildx-

      - name: Cache Build Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/npm
            ~/.cargo/registry
            ~/.cargo/git
            ~/.ccache
          key: ${{ runner.os }}-deps-${{ inputs.platform }}-${{ hashFiles('scripts/**') }}
          restore-keys: |
            ${{ runner.os }}-deps-${{ inputs.platform }}-
            ${{ runner.os }}-deps-

      - name: Login to DockerHub with Retry
        run: |
          source error_handler.sh
          docker_retry "echo '${{ secrets.DOCKER_PASSWORD }}' | docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin"

      - name: Checkout Secrets Repository
        if: ${{ inputs.secrets_repo }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
          token: ${{ secrets.PAT_TOKEN }}
          repository: "NoMercy-Entertainment/nomercy-ffmpeg-secrets"
          path: "${{ github.workspace }}/nomercy-ffmpeg-secrets"

      - name: Copy Secrets
        if: ${{ inputs.secrets_repo }}
        run: |
          cp -r nomercy-ffmpeg-secrets/* ${{ github.workspace }}/scripts/
          rm -rf nomercy-ffmpeg-secrets

      - name: Build Docker Image with Retry
        run: |
          source error_handler.sh
          IMAGE="nomercyentertainment/ffmpeg-${{ inputs.platform }}"

          NO_CACHE_FLAG=""
          if [[ "${{ inputs.no_cache }}" == "true" ]]; then
            echo "🔥 No-cache build"
            NO_CACHE_FLAG="--no-cache"
          fi

          # docker driver = host dockerd builder, no nested container
          # Build + load locally, then push separately
          BUILD_ARGS="--file ${{ inputs.dockerfile }} \
            --tag ${IMAGE}:latest \
            --tag ${IMAGE}:${{ github.sha }} \
            ${NO_CACHE_FLAG} \
            --load \
            ${{ inputs.context }}"

          MAX_BUILD_ATTEMPTS=2
          for attempt in $(seq 1 $MAX_BUILD_ATTEMPTS); do
            echo "🔄 Build attempt $attempt/$MAX_BUILD_ATTEMPTS"
            if docker buildx build $BUILD_ARGS; then
              echo "✅ Build succeeded on attempt $attempt"
              break
            else
              echo "❌ Build failed on attempt $attempt"
              if [ $attempt -lt $MAX_BUILD_ATTEMPTS ]; then
                echo "🧹 Cleaning up before retry..."
                docker system prune -af --volumes || true
                docker builder prune -af || true
                rm -rf /tmp/* || true
                echo "⏰ Waiting 30 seconds before retry..."
                sleep 30
              else
                echo "💥 Build failed after $MAX_BUILD_ATTEMPTS attempts"
                # Generate build failure report
                echo "## Build Failure Report" > build-failure-report.md
                echo "Platform: ${{ inputs.platform }}" >> build-failure-report.md
                echo "Dockerfile: ${{ inputs.dockerfile }}" >> build-failure-report.md
                echo "Timestamp: $(date)" >> build-failure-report.md
                echo "Attempts: $MAX_BUILD_ATTEMPTS" >> build-failure-report.md
                echo "" >> build-failure-report.md
                echo "### System Information:" >> build-failure-report.md
                df -h >> build-failure-report.md
                echo "" >> build-failure-report.md
                docker system df >> build-failure-report.md
                exit 1
              fi
            fi
          done
        timeout-minutes: 240  # 4 hour timeout — Windows cross-compile on fuse-overlayfs runs ~3h

      - name: Push to DockerHub
        if: success()
        run: |
          source error_handler.sh
          IMAGE="nomercyentertainment/ffmpeg-${{ inputs.platform }}"
          docker_retry "docker push ${IMAGE}:latest"
          docker_retry "docker push ${IMAGE}:${{ github.sha }}"

      - name: Upload Build Failure Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-report-${{ inputs.platform }}
          path: build-failure-report.md
          retention-days: 7

      - name: Optimize Cache
        if: success()
        run: |
          # Move cache to avoid cache bloat
          if [ -d ~/.docker/buildx-cache-new ]; then
            rm -rf ~/.docker/buildx-cache
            mv ~/.docker/buildx-cache-new ~/.docker/buildx-cache
            echo "✅ Cache optimized"
          fi

      - name: Verify Build Output
        if: success()
        run: |
          source error_handler.sh
          
          echo "🔍 Verifying build output..."
          docker_retry "docker pull nomercyentertainment/ffmpeg-${{ inputs.platform }}:latest"
          
          # Test that the image can run
          if docker run --rm nomercyentertainment/ffmpeg-${{ inputs.platform }}:latest echo "Build verification successful"; then
            echo "✅ Build verification passed"
          else
            echo "❌ Build verification failed"
            exit 1
          fi

      - name: Clean up build artifacts
        if: always()
        run: |
          echo "🧹 Cleaning up build artifacts..."
          docker system prune -af --volumes || true
          # Only prune build cache, not the builder itself (avoids recreating the buildkit container each run)
          docker buildx prune -af || true
          rm -rf ~/.docker/buildx-cache-new || true
          echo "✅ Cleanup completed"

      - name: Send Success Notification
        if: success()
        run: |
          echo "✅ Build completed successfully for ${{ inputs.platform }}"
          echo "Image: nomercyentertainment/ffmpeg-${{ inputs.platform }}:latest"
          echo "Build time: $(date)"

      - name: Send Failure Notification  
        if: failure()
        run: |
          echo "❌ Build failed for ${{ inputs.platform }}"
          echo "Check the build failure report artifact for details"
          echo "Failure time: $(date)"