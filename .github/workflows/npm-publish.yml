name: npm Publish (ffmpeg-static)

# Releases are created by main.yml with the default GITHUB_TOKEN, whose events
# never trigger other workflows (GitHub recursion prevention) — so the release
# trigger below only fires for manually created releases. workflow_run is the
# reliable path: it fires when the CI/CD Pipeline completes on master, and the
# version-check gate keeps it a no-op unless clients/npm was actually bumped.
on:
  release:
    types: [created]
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]
  workflow_dispatch:

defaults:
  run:
    working-directory: clients/npm

jobs:
  # Gate first: a binary-only release never bumps the npm client version, so
  # this check skips the whole publish job — the npm CI ignores binary changes.
  check:
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.version-check.outputs.skip }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Check if version is already published
        id: version-check
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view "$PACKAGE_NAME@$LOCAL_VERSION" version 2>/dev/null || echo "")
          if [ "$LOCAL_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "Version $LOCAL_VERSION already published — skipping npm publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Publishing $LOCAL_VERSION (not yet on npm)."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  publish-npm:
    needs: check
    if: needs.check.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build package
        run: npm run build

      - name: Publish package
        run: npm publish --provenance --access public
