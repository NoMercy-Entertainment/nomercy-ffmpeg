name: CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild of all images'
        required: true
        type: boolean
        default: true
      enable_cache_warmup:
        description: 'Warm up caches before building'
        required: false
        type: boolean
        default: false

jobs:
  # Detect what has changed to optimize builds
  detect-changes:
    uses: ./.github/workflows/detect-changes.yml
    with:
      force_rebuild: ${{ inputs.force_rebuild || false }}

  # Optional cache warmup for better build performance
  cache-warmup:
    runs-on: ubuntu-latest
    if: inputs.enable_cache_warmup
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Warm Up Global Caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/npm
            ~/.cargo/registry
            ~/.cargo/git
            ~/.ccache
            ~/.docker/buildx-cache
          key: global-cache-warmup-${{ github.sha }}
          restore-keys: |
            global-cache-warmup-
            ${{ runner.os }}-deps-
            ${{ runner.os }}-buildx-

      - name: Pre-populate Build Caches
        run: |
          echo "🔥 Pre-warming build environment caches..."
          mkdir -p ~/.cache/pip ~/.cache/npm ~/.cargo/registry ~/.docker/buildx-cache
          echo "✅ Cache directories prepared"

  # Build the base image that others depend on
  build-base:
    needs: [detect-changes, cache-warmup]
    if: needs.detect-changes.outputs.base-changed == 'true' || needs.detect-changes.outputs.workflow-changed == 'true' || inputs.force_rebuild
    uses: ./.github/workflows/reusable-docker-build.yml
    with:
      dockerfile: ffmpeg-base.dockerfile
      platform: base
      secrets_repo: false
      depends_on_base: false
      labels: ubuntu-latest
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  # Build platform-specific images using the reusable workflow
  build-linux-x86_64:
    needs: [detect-changes, build-base]
    if: needs.detect-changes.outputs.linux-x86_64-changed == 'true' || needs.detect-changes.outputs.base-changed == 'true' || needs.detect-changes.outputs.workflow-changed == 'true' || inputs.force_rebuild
    uses: ./.github/workflows/reusable-docker-build.yml
    with:
      dockerfile: ffmpeg-linux-x86_64.dockerfile
      platform: linux-x86_64
      secrets_repo: true
      labels: self-hosted,builderz
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  build-linux-aarch64:
    needs: [detect-changes, build-base]
    if: needs.detect-changes.outputs.linux-aarch64-changed == 'true' || needs.detect-changes.outputs.base-changed == 'true' || needs.detect-changes.outputs.workflow-changed == 'true' || inputs.force_rebuild
    uses: ./.github/workflows/reusable-docker-build.yml
    with:
      dockerfile: ffmpeg-linux-aarch64.dockerfile
      platform: linux-aarch64
      secrets_repo: true
      labels: self-hosted,builderz
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  build-windows-x86_64:
    needs: [detect-changes, build-base]
    if: needs.detect-changes.outputs.windows-x86_64-changed == 'true' || needs.detect-changes.outputs.base-changed == 'true' || needs.detect-changes.outputs.workflow-changed == 'true' || inputs.force_rebuild
    uses: ./.github/workflows/reusable-docker-build.yml
    with:
      dockerfile: ffmpeg-windows-x86_64.dockerfile
      platform: windows-x86_64
      secrets_repo: true
      labels: self-hosted,builderz
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  build-darwin-x86_64:
    needs: [detect-changes, build-base]
    if: needs.detect-changes.outputs.darwin-x86_64-changed == 'true' || needs.detect-changes.outputs.base-changed == 'true' || needs.detect-changes.outputs.workflow-changed == 'true' || inputs.force_rebuild
    uses: ./.github/workflows/reusable-docker-build.yml
    with:
      dockerfile: ffmpeg-darwin-x86_64.dockerfile
      platform: darwin-x86_64
      secrets_repo: true
      labels: ubuntu-latest
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  build-darwin-arm64:
    needs: [detect-changes, build-base]
    if: needs.detect-changes.outputs.darwin-arm64-changed == 'true' || needs.detect-changes.outputs.base-changed == 'true' || needs.detect-changes.outputs.workflow-changed == 'true' || inputs.force_rebuild
    uses: ./.github/workflows/reusable-docker-build.yml
    with:
      dockerfile: ffmpeg-darwin-arm64.dockerfile
      platform: darwin-arm64
      secrets_repo: true
      labels: ubuntu-latest
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  # Export artifacts from built images
  export-artifacts:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-linux-x86_64, build-linux-aarch64, build-windows-x86_64, build-darwin-x86_64, build-darwin-arm64]
    if: always() && (needs.detect-changes.outputs.any-changed == 'true' || inputs.force_rebuild) && (needs.build-linux-x86_64.result != 'failure' || needs.build-linux-aarch64.result != 'failure' || needs.build-windows-x86_64.result != 'failure' || needs.build-darwin-x86_64.result != 'failure' || needs.build-darwin-arm64.result != 'failure')
    steps:
      - name: Cache Downloaded Artifacts
        uses: actions/cache@v4
        with:
          path: downloads/
          key: artifacts-${{ github.sha }}-${{ hashFiles('**/*.dockerfile') }}
          restore-keys: |
            artifacts-${{ github.sha }}-
            artifacts-

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create downloads directory
        run: mkdir -p downloads

      - name: Export Artifacts
        run: |
          # Define platforms and their corresponding archive formats
          declare -A platforms=(
            ["linux-x86_64"]="tar.gz"
            ["linux-aarch64"]="tar.gz"
            ["windows-x86_64"]="zip"
            ["darwin-x86_64"]="tar.gz"
            ["darwin-arm64"]="tar.gz"
          )
          
          for platform in "${!platforms[@]}"; do
            echo "🚀 Exporting $platform..."
            if docker pull nomercyentertainment/ffmpeg-${platform}:latest; then
              docker create --name ${platform}-container nomercyentertainment/ffmpeg-${platform}:latest
              if docker cp ${platform}-container:/build/ffmpeg-8.0-${platform}.${platforms[$platform]} downloads/ffmpeg-8.0-${platform}.${platforms[$platform]}; then
                echo "✅ Successfully exported $platform"
                ls -lh downloads/ffmpeg-8.0-${platform}.${platforms[$platform]}
              else
                echo "⚠️ Artifact not found for $platform"
              fi
              docker rm ${platform}-container
            else
              echo "⚠️ Failed to pull image for $platform"
            fi
          done
          
          # Display final artifacts
          echo "📦 Final artifacts:"
          ls -lh downloads/ || echo "No artifacts found"
      
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: downloads/
          retention-days: 30
          
      - name: Create Artifact Summary
        run: |
          echo "## Build Artifacts Summary" > artifact-summary.md
          echo "Generated: $(date)" >> artifact-summary.md
          echo "" >> artifact-summary.md
          
          if [ -d downloads ] && [ "$(ls -A downloads)" ]; then
            echo "### Successfully Built Platforms:" >> artifact-summary.md
            for file in downloads/*; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                size=$(du -h "$file" | cut -f1)
                echo "- **$filename**: $size" >> artifact-summary.md
              fi
            done
          else
            echo "⚠️ No artifacts were generated" >> artifact-summary.md
          fi
          
          echo "" >> artifact-summary.md
          echo "### Cache Performance" >> artifact-summary.md
          echo "- Docker registry cache: Enabled" >> artifact-summary.md
          echo "- Local buildx cache: Enabled" >> artifact-summary.md
          echo "- Dependency cache: Enabled" >> artifact-summary.md
          echo "- Artifact cache: Enabled" >> artifact-summary.md
          
          cat artifact-summary.md

      - name: Upload Artifact Summary
        uses: actions/upload-artifact@v4
        with:
          name: artifact-summary
          path: artifact-summary.md
          retention-days: 30